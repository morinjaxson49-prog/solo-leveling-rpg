<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solo Leveling 3D RPG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #16213e 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100vh;
    }

    #controls {
      position: absolute;
      bottom: 30px;
      right: 30px;
      color: #00ff00;
      font-size: 13px;
      background: rgba(0, 0, 0, 0.85);
      padding: 18px;
      border: 2px solid #00ff00;
      border-radius: 8px;
      backdrop-filter: blur(5px);
      text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
    }
    
    .control-section {
      margin-bottom: 12px;
    }
    
    .control-section:last-child {
      margin-bottom: 0;
    }
    
    .control-title {
      color: #ffaa00;
      font-weight: bold;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div id="controls">
    <div class="control-section">
      <div class="control-title">Movement:</div>
      W/A/S/D - Move
    </div>
    <div class="control-section">
      <div class="control-title">Skills:</div>
      1 - Slash (15 Mana)<br>
      2 - Power Attack (40 Stm)<br>
      3 - Dash (20 Stm)<br>
      4 - Heal (25 Mana)
    </div>
    <div class="control-section">
      <div class="control-title">Tips:</div>
      • Level up to get stronger<br>
      • Manage stamina & mana<br>
      • Bosses appear every 10 kills
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
