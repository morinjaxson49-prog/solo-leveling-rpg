<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solo Leveling 3D RPG</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background-color: #1a1a2e;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #00ff00;
      font-size: 18px;
      text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
      font-weight: bold;
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      border: 2px solid #00ff00;
      border-radius: 5px;
      min-width: 250px;
    }

    .stat {
      margin: 10px 0;
    }

    .stat-bar {
      width: 200px;
      height: 15px;
      background: #333;
      border: 1px solid #00ff00;
      margin-top: 5px;
      position: relative;
    }

    .stat-bar-fill {
      height: 100%;
      background: #00ff00;
      transition: width 0.3s ease;
    }

    #controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: #00ff00;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border: 2px solid #00ff00;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="stat">Level: <span id="level">1</span></div>
    <div class="stat">
      Experience:
      <div class="stat-bar">
        <div class="stat-bar-fill" id="expBar"></div>
      </div>
    </div>
    <div class="stat">
      Health:
      <div class="stat-bar">
        <div class="stat-bar-fill" id="healthBar"></div>
      </div>
    </div>
    <div class="stat">
      Stamina:
      <div class="stat-bar">
        <div class="stat-bar-fill" id="staminaBar"></div>
      </div>
    </div>
    <div class="stat">Skill: <span id="skill">10</span></div>
  </div>

  <div id="controls">
    <strong>Controls:</strong><br>
    W - Forward<br>
    A - Left<br>
    S - Backward<br>
    D - Right<br>
    Auto-attack when close to monsters
  </div>

  <script src="game.js"></script>
</body>
</html>
